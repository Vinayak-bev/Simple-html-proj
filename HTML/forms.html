<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Captcha form</h2>
    <center><form>
        <br>
        <fieldset>
        <legend>Personal Information</legend>
        <br>
        <label for="captcha">Enter Captcha: </label>
        <input type="text" id="captcha" placeholder="enter captcha...." name="captcha">
        <br>
        <br>
        <label for="un">Username: </label>
        <input type="text" placeholder="Enter name...." id="un" name="username">
        <input type="submit">
        <input type="reset" value="cancel">
        <br>
        <br>
        <label>Email :</label>
        <input type="email" name="email">
        <br>
        <br>
        <label>Password: <span style="color: red">*</span></label>
        <input type="password" name="pwd" required>
        <br>
        <br>
        <label>Mobile: </label>
        <input type="tel">
        <br>
        <br>
        <label>Age :</label>
        <input type="number" min="1" max="100">
        <br>
        <br>
         <label>Date of Birth:</label>
        <input type="time">
        <br>
        </fieldset>
        <br>
        <fieldset>
            <legend>General Information</legend>
            <br>
        <label>Date of Birth:</label>
        <input type="date">
        <br>
        <br>
        <label>Date of Birth with Time:</label>
        <input type="datetime-local">
        <br>
        <br>
        <label>Profile URL</label>
        <input type="url">
        <br>
        <br>
        <label>other :</label>
        <input type="color">
        <br>
        <br>
        <label>other :</label>
        <input type="image" src="">
        <br>
        <br>
        <label>upload pan card</label>
        <input type="file">
        <br>
        <br>
        <label>Rate out of 5</label>
        <input type="range" min="1" max="5" name="HTML rating" value="0">
        <br>
        <br>
        <label><input type="checkbox" name="opt1" value="cash"> Cash</label>
        <label><input type="checkbox" name="opt2" value="UPI"> UPI</label>
        <label><input type="checkbox" name="opt3" value="rpay"> RazorPay</label>
        <br>
        <br>
        <label>gender:</label>
        <label><input type="radio" name="opt" value="male"> Male</label>
        <label><input type="radio" name="opt" value="female"> Female</label>
        <br>
        <br>
        <label>Your allowed</label>
        <input type="hidden">
        <br>
        <br>
        <label for="tech">Choose the Tech Stack</label>
        <select name="tech" id="tech" multiple>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option calue="Js">Javascript</option>
        </select>
        <br>
        </fieldset>
        <br>
        <label for="comment">Cooments: </label>
        <textarea id="comment" rows="5" cols="40" name="comments" placeholder="ENter comment.....">
        </textarea>
        <br>
        <br>
        <button type="button">Help Center</button>
        <br>
    </form></center>
</body>
</html>
